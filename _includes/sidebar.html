<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="profile-mark" aria-hidden="true">JN</div>

    <div class="sidebar-about">
      <h1>
        <a href="{{ '/' | relative_url }}">
          {{ site.title }}
        </a>
      </h1>
      <p class="lead">{{ site.author.korean_name }}</p>
      <p class="sidebar-summary">Sensor fusion, smart factory control, and smart manufacturing AI agents.</p>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-nav-item{% if page.url == '/' %} active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
      <a class="sidebar-nav-item{% if page.url == '/about/' %} active{% endif %}" href="{{ '/about/' | relative_url }}">About</a>
      <a class="sidebar-nav-item" href="https://github.com/{{ site.author.github }}">GitHub</a>
      <a class="sidebar-nav-item" href="mailto:{{ site.author.email }}">Email</a>
    </nav>

    <p class="sidebar-footer">{{ site.author.email }}<br>&copy; {{ site.time | date: '%Y' }}</p>
  </div>
</div>
